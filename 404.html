<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — Positive Mindset</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="legal.css" />
  <style>
    .not-found {
      max-width: 760px;
      margin: 0 auto;
      text-align: center;
    }

    .not-found-title {
      margin-bottom: 14px;
    }

    .not-found-text {
      max-width: 620px;
      margin: 0 auto;
      opacity: 0.84;
      line-height: 1.7;
    }

    .not-found-actions {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 28px;
    }

    .not-found-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 18px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
      transition: transform 0.18s ease, opacity 0.18s ease;
    }

    .not-found-button:hover {
      transform: translateY(-2px);
    }

    .not-found-button.primary {
      background: linear-gradient(135deg, #7dd3fc, #60a5fa);
      color: #08111f;
    }

    .not-found-button.secondary {
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.03);
      color: inherit;
    }
  </style>
</head>
<body>
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>

  <main class="legal-wrap">
    <div class="container">
      <section class="hero not-found">
        <h1 class="not-found-title">Page not found</h1>
        <div class="hero-meta">404</div>
      </section>

      <section class="card legal-card">
        <div class="legal-content not-found">
          <p class="not-found-text">
            The page you are looking for may have been moved, renamed, or is no longer available.
          </p>

          <div class="not-found-actions">
            <a class="not-found-button primary" href="/">Go to homepage</a>
            <a class="not-found-button secondary" href="/help/">Help</a>
          </div>
        </div>
      </section>
    </div>
  </main>
</body>
</html>
