<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flourish — Positive Mindset</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles.css" />
  <link rel="stylesheet" href="../legal.css" />
  <style>
    .app-fallback {
      max-width: 760px;
      margin: 0 auto;
      text-align: center;
    }

    .app-fallback .app-links {
      justify-content: center;
      margin-top: 24px;
    }

    .fallback-text {
      max-width: 620px;
      margin: 0 auto;
      opacity: 0.84;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>

  <main class="legal-wrap">
    <div class="container">
      <section class="hero app-fallback">
        <h1>Flourish</h1>
        <div class="hero-meta">Affirmations · Wellbeing</div>
      </section>

      <section class="card legal-card">
        <div class="legal-content app-fallback">
          <p class="fallback-text">
            Flourish is a calm affirmations app designed to support positive thinking, self-worth, gratitude, and daily emotional resilience.
          </p>

          <div class="app-links">
            <a class="store-link" href="https://apps.apple.com/us/app/flourish-daily-affirmations/id1613148062" target="_blank" rel="noopener noreferrer">App Store</a>
            <a class="store-link" href="https://play.google.com/store/apps/details?id=com.positivemindset.apps.flourish&pli=1" target="_blank" rel="noopener noreferrer">Google Play</a>
          </div>
        </div>
      </section>
    </div>
  </main>

</html>
